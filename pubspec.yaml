name: online_exam
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  bloc: ^9.2.0
  cupertino_icons: ^1.0.8
  dartz: null
  dio: ^5.9.2
  equatable: null
  flutter:
    sdk: flutter
  flutter_bloc: null
  flutter_otp_text_field: null
  get_it: null
  go_router: null
  injectable: null
  json_annotation: null
  logger: # for logging purpose
    null
  retrofit: null
  shared_preferences: null

dev_dependencies:
  build_runner: ^2.6.0
  easy_localization: ^3.0.8
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: null
  json_serializable: ^6.10.0
  percent_indicator: ^4.2.5
  retrofit_generator: ^10.0.1
flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
          weight: 400
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
